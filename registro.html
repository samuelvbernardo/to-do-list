<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="registro.css">
</head>
<body>
    <div class="container">
        <form>
            <h1>Registre-se</h1>
            <div class="input-container">
                <input placeholder="Nome Completo" type="text" required>
            </div>
            <div class="input-container">
                <input placeholder="Email" type="email" required>
                <img width="20" height="20" src="https://img.icons8.com/ios-filled/50/FFFFFF/user.png" alt="user"/>
            </div>

            <div class="input-container">
                <input placeholder="Senha" type="password" required>
                <img width="20" height="20" src="https://img.icons8.com/ios-filled/50/FFFFFF/lock-2.png" alt="lock-2"/>
            </div>
            <div class="input-container">
                <input placeholder="Confirmar Senha" type="password" required>
                <img width="20" height="20" src="https://img.icons8.com/ios-filled/50/FFFFFF/lock-2.png" alt="lock-2"/>
            </div>
            
            <a href="#"><button type="submit"class="submit-button">Registrar</button></a>

            <div class="register-link">
                <div class="register-link">
                    <p> Já tem uma conta? <a href="login.html">Entrar</a> </p>
                </div>
            </div>
        </form>
    </div>
</body>
</html>
