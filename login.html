<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Login</title>
    <link rel="stylesheet" href="login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>

<body>
    <div class="container">
        <form>
            <h1>Entrar na Plataforma</h1>
            <div class="input-container">
                <input placeholder="Email" type="email" required>
                <img width="20" height=20" src="https://img.icons8.com/ios-filled/50/FFFFFF/user.png" alt="user"/>
            </div>

            <div class="input-container">
                <input placeholder="Senha" type="password" required>
                <img width="20" height="20" src="https://img.icons8.com/ios-filled/50/FFFFFF/lock-2.png" alt="lock-2"/>
                <a href="#">Esqueci minha senha</a>
            </div>

            <a href="index.html"><button type="button"class="submit-button">Entrar</button></a>

            <div class="register-link">
                <div class="register-link">
                    <p> Não tem uma conta? <a href="#">Registre-se</a> </p>
                </div>
            </div>

        </form>
    </div>
</body>
</html>
